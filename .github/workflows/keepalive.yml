name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Streamlit
        run: |
          curl --fail --silent --show-error \
               --location \
               --max-time 60 \
               --user-agent "GitHub-Actions-KeepAlive" \
               https://autosplit.streamlit.app/
