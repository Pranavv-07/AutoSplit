name: Keep Streamlit Awake

on:
  schedule:
    # Note: */25 runs at minute 0,25,50 each hour (approximate 25-minute cadence).
    - cron: "*/25 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Show current time
        run: date

      - name: Warm app with HTTP retry
        run: |
          curl -L \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 90 \
            -o /tmp/response.html \
            https://autosplit.streamlit.app/
          echo "Final URL and HTTP status:"
          curl -Ls -o /dev/null -w "Final URL: %{url_effective}\nHTTP Status: %{http_code}\n" https://autosplit.streamlit.app/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Click wake button if sleep screen is shown
        run: |
          node <<'EOF'
          const { chromium } = require('playwright');

          const APP_URL = 'https://autosplit.streamlit.app/';
          const SLEEP_PATTERNS = /wake application|sleep mode|app is sleeping|application is sleeping/i;
          const MAX_ATTEMPTS = 3;

          async function run() {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();
            page.setDefaultTimeout(30000);

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              try {
                console.log(`Attempt ${attempt}/${MAX_ATTEMPTS}: opening app`);
                await page.goto(APP_URL, { waitUntil: 'domcontentloaded', timeout: 60000 });
                await page.waitForTimeout(5000);

                const bodyText = await page.locator('body').innerText();
                const isSleeping = SLEEP_PATTERNS.test(bodyText);

                if (!isSleeping) {
                  console.log('App appears awake, no wake click needed.');
                  await browser.close();
                  return;
                }

                console.log('Sleep screen detected, trying wake button click...');
                const wakeButton = page.getByRole('button', { name: /wake application|wake/i }).first();
                if (await wakeButton.count()) {
                  await wakeButton.click({ timeout: 15000 });
                  await page.waitForTimeout(12000);
                  const afterClickText = await page.locator('body').innerText();
                  if (!SLEEP_PATTERNS.test(afterClickText)) {
                    console.log('Wake button clicked and app appears awake.');
                    await browser.close();
                    return;
                  }
                  console.log('Wake click did not clear sleep screen yet.');
                } else {
                  console.log('Wake button not found on sleep screen.');
                }
              } catch (error) {
                console.log(`Attempt ${attempt} failed: ${error.message}`);
              }
            }

            await browser.close();
            throw new Error('App still appears asleep after retries.');
          }

          run().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          EOF

      - name: Success message
        run: echo "Workflow completed."


          
